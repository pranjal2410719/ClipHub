services:
  - type: web
    name: cliphub-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: APP_MODE
        value: global
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false